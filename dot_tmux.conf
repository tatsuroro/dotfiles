# =============================================================================
# tmux.conf - Updated for tmux 3.6+
# =============================================================================

# -----------------------------------------------------------------------------
# Prefix
# -----------------------------------------------------------------------------
unbind C-b
set -g prefix C-Space
bind Space send-prefix

# -----------------------------------------------------------------------------
# Terminal & Colors
# -----------------------------------------------------------------------------
# tmux-256color supports italics; use screen-256color if not available
set -g default-terminal "tmux-256color"

# True color (RGB) support - modern way for tmux 3.2+
# This tells tmux that the terminal outside supports true color
set -as terminal-features ",*256col*:RGB"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",alacritty:RGB"
set -as terminal-features ",xterm-kitty:RGB"
set -as terminal-features ",xterm-ghostty:RGB"

# Fallback for older methods (still works)
# set -as terminal-overrides ",*256col*:Tc"

# -----------------------------------------------------------------------------
# General Options
# -----------------------------------------------------------------------------
# Scroll buffer size
set -g history-limit 10000

# Disable ESC delay (important for vim)
set -s escape-time 0

# Focus events (useful for vim autoread)
set -g focus-events on

# Automatic window rename
set -g automatic-rename on

# Renumber windows when one is closed
set -g renumber-windows on

# Start window index from 1
set -g base-index 1

# Start pane index from 1
set -g pane-base-index 1

# -----------------------------------------------------------------------------
# Mouse Options
# -----------------------------------------------------------------------------
set -g mouse on

# Mouse wheel scrolling - updated syntax for tmux 3.0+
bind -T root WheelUpPane \
    if-shell -F -t = "#{alternate_on}" \
        "send-keys -M" \
        "select-pane -t =; copy-mode -e; send-keys -M"

bind -T root WheelDownPane \
    if-shell -F -t = "#{alternate_on}" \
        "send-keys -M" \
        "select-pane -t =; send-keys -M"

# -----------------------------------------------------------------------------
# Status Bar
# -----------------------------------------------------------------------------
set -g status-style "fg=white,bg=black"
set -g status-position top

# Status bar options
set -g status on
set -g status-interval 2
set -g status-justify left
set -g status-left-length 60
set -g status-right-length 60

# tmux-powerline (uncomment if using)
# set -g status-left "#(~/.tmux.d/tmux-powerline/powerline.sh left)"
# set -g status-right "#(~/.tmux.d/tmux-powerline/powerline.sh right)"

# Simple status bar (comment out if using powerline)
set -g status-left "#[fg=green,bold] #S "
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=white]%H:%M "

# Window status - using powerline-style separators
set -g window-status-separator ''
set -g window-status-format "#[fg=colour232,bg=colour59]#[fg=colour0,bg=colour59] #I  #W #[fg=colour59,bg=colour232]"
set -g window-status-current-format "#[fg=colour232,bg=colour30]#[fg=colour250,bg=colour30,bold] #I  #W #[fg=colour30,bg=colour232]"

# -----------------------------------------------------------------------------
# Key Bindings
# -----------------------------------------------------------------------------
unbind ^C

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Tmux Config Reloaded..."

# Window management
bind c new-window -c "#{pane_current_path}"
bind p previous-window
bind n next-window
bind t last-window

# Pane/Window kill
bind q kill-pane
bind Q kill-window

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Tab select-pane -t :.+

# Resize panes
bind -n M-Up resize-pane -U 3
bind -n M-Down resize-pane -D 3
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5

# -----------------------------------------------------------------------------
# Copy Mode
# -----------------------------------------------------------------------------
bind Space copy-mode
bind C-Space copy-mode

# Vi mode
set -g mode-keys vi

# macOS clipboard integration - modern way (tmux 3.2+)
# copy-command is used automatically by copy-selection and copy-pipe
if-shell 'which pbcopy' 'set -s copy-command "pbcopy"'

# Vi keybindings in copy mode
# Note: reattach-to-user-namespace is no longer needed since tmux 2.6
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse drag to copy (already uses copy-command if set)
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Double click to select word and copy
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T root DoubleClick1Pane select-pane -t = \; if-shell -F "#{pane_in_mode}" {} { copy-mode -H ; send-keys -X select-word ; send-keys -X copy-pipe-and-cancel "pbcopy" }

# -----------------------------------------------------------------------------
# Logging (optional)
# -----------------------------------------------------------------------------
bind Z pipe-pane 'cat >> $HOME/.tmux.d/tmux-#W.log' \; display-message 'Started logging to $HOME/.tmux.d/tmux-#W.log'
bind z pipe-pane \; display-message 'Ended logging to $HOME/.tmux.d/tmux-#W.log'

# -----------------------------------------------------------------------------
# Additional Modern Options (tmux 3.2+)
# -----------------------------------------------------------------------------

# Extended keys for better key handling (useful for neovim)
set -g extended-keys on

# Allow passthrough for images in terminal (sixel, kitty graphics protocol)
set -g allow-passthrough on

# Clipboard setting - use system clipboard
set -g set-clipboard on
